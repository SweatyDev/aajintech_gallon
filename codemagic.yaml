workflows:
  ios-please-work-for-the-love-of-god:
    name: iOS signing, please

    environment:
      xcode: latest
      flutter: stable

    scripts:
      - name: XCode, please use my profiles :)
        script: xcode-project use-profiles

      - name: Get flutter packages, please.
        script: flutter pub get

      - name: Build iOS, pretty please.
        script: flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa
