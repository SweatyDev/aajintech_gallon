workflows:
  ios-please-work:
    name: Put it on iOS NOW!!!

    environment:
      distribution_type: app_store
      bundle_identifier: com.codemagic.salam

    scripts:
      - name: Get flutter packages, please.
        script: flutter packages pub get
      - name: Build iOS, pretty please.
        script: flutter build ipa

    artifacts: build/ios/ipa/*.ipa
