workflow:
  ios-please-work-for-the-love-of-god:
    name: iOS signing, please
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.aajintech.calculator

    scripts:
      - name: XCode, please use my profiles :)
        script: xcode-project use-profiles

      - name: Get flutter packages, please.
        script: flutter pub get

      - name: Build iOS, pretty please.
        script: flutter build ipa

    artifacts:
      - build/ios/ipa/*.ipa
