workflows:
  ios-please-work-for-the-love-of-god:
    name: iOS signing, please

    environment:
      xcode: latest
      flutter: stable

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.aajintech.calculator

    scripts:
      - script: keychain initialize
      - script: keychain add-certificates
      - script: xcode-project use-profiles

      - name: Get flutter packages, please.
        script: flutter pub get

      - name: Build iOS, pretty please.
        script: flutter build ipa --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
