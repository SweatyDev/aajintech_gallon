workflows:
  ios-please-work:
    name: Put it on iOS NOW!!!

    environment:
      flutter: stable
      xcode: latest
      distribution_type: app_store
      bundle_identifier: com.aajintech.calculator

    scripts:
      - name: Get flutter packages, please.
        script: flutter pub get

      - name: Build iOS, pretty please.
        script: flutter build ipa

    artifacts:
      - build/ios/ipa/*.ipa
